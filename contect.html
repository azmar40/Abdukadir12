<section class="contact-section">
<h2>Order / Contact Form</h2>
<form>
<fieldset>
<legend>Customer Information</legend>
<label>Full Name</label>
<input type="text"
placeholder="Enter your full name"
required
minlength="3">
<br>
<label>Email Address</label>
<input type="email"
placeholder="Enter your email"
required>
<br>
<label>Password</label>
<input type="password"
placeholder="Create password"
required
minlength="8">
<br>
<label>Phone Number</label>
<input type="tel"
placeholder="+25261xxxxxxx"
pattern="[0-9+]{10,15}"
required>
<br>
<label>Select Product</label>
<select required>
<option value="">Choose Product</option>
<option>Running Shoes</option>
<option>Football</option>
<option>Gym Gloves</option>
<option>Sports Bag</option>
<option>Football Jersey</option>
<option>Sports Watch</option>
<option>Sports Cap</option>
</select>
<br><br>
<label>Payment Method</label>
<input type="radio" name="payment" required>
Cash
<input type="radio" name="payment">
EVC Plus
<input type="radio" name="payment">
Bank
<br><br>
<label>Extra Services</label>
<input type="checkbox">
Gift Wrap
<input type="checkbox">
Express Delivery
<input type="checkbox">
SMS Notification
<br><br>
<label>Your Message</label>
<textarea rows="6"
placeholder="Write your message here..."
required></textarea>
<br><br>
<input type="submit" value="Place Order" class="btn">
</fieldset>
</form>
</section>
<footer>

</p>
</footer>
</body>
</html>
